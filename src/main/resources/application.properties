# ========================
# APLICAÇÃO
# ========================
spring.application.name=saude-api
server.port=8080
server.servlet.context-path=/

# ========================
# BANCO H2
# ========================
spring.datasource.url=jdbc:h2:file:./database/saude-db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Console H2 — acessível em http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ========================
# JPA / HIBERNATE
# ========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ========================
# PAGINAÇÃO (padrões globais)
# ========================
spring.data.web.pageable.default-page-size=10
spring.data.web.pageable.max-page-size=100
spring.data.web.pageable.one-indexed-parameters=false

# ========================
# SERIALIZAÇÃO JSON
# ========================
# Não serializa campos nulos na resposta
spring.jackson.default-property-inclusion=non_null
# Formato de datas legível
spring.jackson.serialization.write-dates-as-timestamps=false

# ========================
# LOGS
# ========================
logging.level.com.example.demo=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql=TRACE

# Formato do log no console
logging.pattern.console=%d{HH:mm:ss} [%-5level] %logger{36} - %msg%n